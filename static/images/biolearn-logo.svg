<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <!-- DNA Helix Structure -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22D3EE;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="20" cy="20" r="18" fill="url(#gradient1)" opacity="0.1"/>

  <!-- DNA Helix -->
  <path d="M8 10 Q20 5 32 10 Q20 15 8 20 Q20 25 32 30" stroke="url(#gradient1)" stroke-width="2.5" fill="none"/>
  <path d="M32 10 Q20 5 8 10 Q20 15 32 20 Q20 25 8 30" stroke="url(#gradient1)" stroke-width="2.5" fill="none" opacity="0.7"/>

  <!-- DNA Base Pairs -->
  <line x1="12" y1="12" x2="28" y2="8" stroke="url(#gradient1)" stroke-width="1.5"/>
  <line x1="28" y1="12" x2="12" y2="8" stroke="url(#gradient1)" stroke-width="1.5"/>
  <line x1="12" y1="20" x2="28" y2="20" stroke="url(#gradient1)" stroke-width="1.5"/>
  <line x1="28" y1="28" x2="12" y2="32" stroke="url(#gradient1)" stroke-width="1.5"/>
  <line x1="12" y1="28" x2="28" y2="32" stroke="url(#gradient1)" stroke-width="1.5"/>

  <!-- Center Nodes -->
  <circle cx="12" cy="12" r="2" fill="#6366F1"/>
  <circle cx="28" cy="8" r="2" fill="#22D3EE"/>
  <circle cx="28" cy="12" r="2" fill="#6366F1"/>
  <circle cx="12" cy="8" r="2" fill="#22D3EE"/>
  <circle cx="20" cy="20" r="2" fill="#6366F1"/>
  <circle cx="28" cy="28" r="2" fill="#6366F1"/>
  <circle cx="12" cy="32" r="2" fill="#22D3EE"/>
  <circle cx="28" cy="32" r="2" fill="#22D3EE"/>
  <circle cx="12" cy="28" r="2" fill="#6366F1"/>
</svg>