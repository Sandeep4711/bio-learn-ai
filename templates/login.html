<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioLearn AI | Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/design-system.css') }}">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            height: 52px;
            background: white;
            color: #1F2937;
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-base);
        }

        .google-btn:hover {
            background: #F9FAFB;
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 32px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-primary);
        }

        .divider span {
            padding: 0 16px;
            color: var(--text-tertiary);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--error);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-size: 14px;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <div class="login-container fade-in">
        <!-- Brand -->
        <div style="text-align: center; margin-bottom: 48px;">
            <a href="/" style="display: inline-flex; align-items: center; gap: 12px; text-decoration: none; margin-bottom: 16px;">
                <img src="{{ url_for('static', filename='images/biolearn-logo.svg') }}" alt="BioLearn AI" style="width: 40px; height: 40px;">
                <span style="font-size: 28px; font-weight: 800; color: var(--primary);">BioLearn AI</span>
            </a>
            <p style="font-size: 18px; font-weight: 600; color: var(--text-primary); margin-bottom: 8px;">Welcome back</p>
            <p style="font-size: 14px; color: var(--text-secondary);">Sign in to continue your learning journey</p>
        </div>

        <!-- Login Card -->
        <div class="card card-elevated" style="padding: 48px;">
            <!-- Flash Messages -->
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="error-message">
                        {{ messages[0] }}
                    </div>
                {% endif %}
            {% endwith %}

            <!-- Google Login Button (PRIMARY) -->
            <a href="/login/google" class="google-btn">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                    <path d="M19.6 10.227c0-.709-.064-1.39-.182-2.045H10v3.868h5.382a4.6 4.6 0 0 1-1.996 3.018v2.51h3.232c1.891-1.742 2.982-4.305 2.982-7.35z" fill="#4285F4"/>
                    <path d="M10 20c2.7 0 4.964-.895 6.618-2.423l-3.232-2.509c-.895.6-2.04.955-3.386.955-2.605 0-4.81-1.76-5.595-4.123H1.064v2.59A9.996 9.996 0 0 0 10 20z" fill="#34A853"/>
                    <path d="M4.405 11.9c-.2-.6-.314-1.24-.314-1.9 0-.66.114-1.3.314-1.9V5.51H1.064A9.996 9.996 0 0 0 0 10c0 1.614.386 3.14 1.064 4.49l3.34-2.59z" fill="#FBBC05"/>
                    <path d="M10 3.977c1.468 0 2.786.505 3.823 1.496l2.868-2.868C14.959.99 12.695 0 10 0 6.09 0 2.71 2.24 1.064 5.51l3.34 2.59C5.19 5.737 7.395 3.977 10 3.977z" fill="#EA4335"/>
                </svg>
                Continue with Google
            </a>

            <div class="divider">
                <span>or sign in with email</span>
            </div>

            <!-- Email/Password Form -->
            <form method="POST" id="loginForm">
                <div class="form-group">
                    <label class="form-label">Email or Username</label>
                    <input
                        type="text"
                        name="username"
                        class="input"
                        placeholder="your@email.com"
                        autocomplete="username"
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input
                        type="password"
                        name="password"
                        class="input"
                        placeholder="Enter your password"
                        autocomplete="current-password"
                        required
                    >
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 24px;" id="submitBtn">
                    <span id="btnText">Sign In</span>
                </button>
            </form>

            <!-- Sign Up Link -->
            <div style="text-align: center; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border-primary);">
                <p style="font-size: 14px; color: var(--text-secondary);">
                    Don't have an account?
                    <a href="/signup" style="color: var(--primary); text-decoration: none; font-weight: 600;">
                        Create one
                    </a>
                </p>
            </div>
        </div>

        <!-- Footer -->
        <p style="text-align: center; margin-top: 32px; font-size: 12px; color: var(--text-tertiary);">
            © 2026 BioLearn AI. All rights reserved.
        </p>
    </div>

    <script>
        // Add loading state to form submission
        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');

        form.addEventListener('submit', function(e) {
            submitBtn.classList.add('btn-loading');
            submitBtn.disabled = true;
            btnText.textContent = 'Signing in...';
        });
    </script>
</body>
</html>
