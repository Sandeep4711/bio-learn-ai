<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="#0f172a" stroke="#6366f1" stroke-width="2"/>
  
  <!-- DNA Helix Left -->
  <path d="M 70 60 Q 65 80 70 100 Q 75 120 70 140" stroke="#22d3ee" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- DNA Helix Right -->
  <path d="M 130 60 Q 135 80 130 100 Q 125 120 130 140" stroke="#22d3ee" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- DNA Connections -->
  <line x1="70" y1="70" x2="130" y2="80" stroke="#22d3ee" stroke-width="2" opacity="0.6"/>
  <line x1="68" y1="90" x2="132" y2="90" stroke="#22d3ee" stroke-width="2" opacity="0.6"/>
  <line x1="70" y1="110" x2="130" y2="110" stroke="#22d3ee" stroke-width="2" opacity="0.6"/>
  <line x1="68" y1="130" x2="132" y2="120" stroke="#22d3ee" stroke-width="2" opacity="0.6"/>
  
  <!-- AI Circuit Node - Center -->
  <circle cx="100" cy="100" r="12" fill="#6366f1" stroke="#22d3ee" stroke-width="2"/>
  
  <!-- AI Circuit Lines -->
  <line x1="100" y1="88" x2="100" y2="70" stroke="#6366f1" stroke-width="2"/>
  <line x1="100" y1="112" x2="100" y2="130" stroke="#6366f1" stroke-width="2"/>
  <line x1="88" y1="100" x2="70" y2="100" stroke="#6366f1" stroke-width="2"/>
  <line x1="112" y1="100" x2="130" y2="100" stroke="#6366f1" stroke-width="2"/>
  
  <!-- Small Circuit Nodes -->
  <circle cx="100" cy="70" r="3" fill="#6366f1"/>
  <circle cx="100" cy="130" r="3" fill="#6366f1"/>
  <circle cx="70" cy="100" r="3" fill="#6366f1"/>
  <circle cx="130" cy="100" r="3" fill="#6366f1"/>
  
  <!-- Book/Learning Symbol at Bottom -->
  <path d="M 85 145 L 85 160 L 115 160 L 115 145" stroke="#a78bfa" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="100" y1="145" x2="100" y2="160" stroke="#a78bfa" stroke-width="1.5"/>
  
  <!-- Subtle glow effect -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.2" filter="url(#glow)"/>
  
  <!-- Glow filter -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>